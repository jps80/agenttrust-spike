<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AgentTrust Registry{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.5;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 1.25rem; }
        header .org { font-size: 0.85rem; opacity: 0.7; font-family: monospace; }
        nav { background: #111827; padding: 0.5rem 2rem; }
        nav a {
            color: #d1d5db;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.9rem;
        }
        nav a:hover { color: white; }
        main { max-width: 960px; margin: 2rem auto; padding: 0 2rem; }
        h2 { margin-top: 0; }
        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .agent-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .agent-row .meta {
            font-family: monospace;
            font-size: 0.8rem;
            color: #6b7280;
            word-break: break-all;
        }
        .agent-row .label {
            display: inline-block;
            background: #ddd6fe;
            color: #4c1d95;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }
        button, .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        button:hover, .btn:hover { background: #4338ca; }
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .badge-revoked {
            display: inline-block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-left: 0.5rem;
        }
        .badge-active {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-left: 0.5rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .alert-warning { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        form .field { margin-bottom: 1rem; }
        form label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }
        form input, form select, form textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        form .help {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        pre {
            background: #1f2937;
            color: #d1fae5;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.8rem;
        }
        .empty {
            text-align: center;
            color: #6b7280;
            padding: 3rem 1rem;
        }
        .scope-tag {
            display: inline-block;
            font-family: monospace;
            font-size: 0.75rem;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin: 0.1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>AgentTrust Registry</h1>
        <span class="org">{{ org_did }}</span>
    </header>
    <nav>
        <a href="/">Agentes</a>
        <a href="/register">Alta de agente</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
